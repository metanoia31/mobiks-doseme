<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1419">
<title>MOBIKS Döşeme Takip</title>
<style>
:root{--bg:#0f1419;--panel:#1a1f2e;--panel2:#232838;--border:#2a3142;--text:#e8eaed;--muted:#8b93a7;--accent:#4a9eff;--green:#4ade80;--red:#f87171;--orange:#fb923c;--yellow:#fbbf24;--purple:#a78bfa;--mavi:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:10px;min-height:100vh;font-size:14px}
.container{max-width:920px;margin:0 auto}

header{background:var(--panel);padding:12px 14px;border-radius:14px;margin-bottom:10px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:6px;z-index:50;backdrop-filter:blur(10px);background:rgba(26,31,46,0.95)}
.h-left{flex:1;min-width:140px}
h1{font-size:17px;font-weight:700;background:linear-gradient(135deg,#4a9eff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--muted);font-size:11px;margin-top:2px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px;vertical-align:middle}
.status-dot.err{background:var(--red)}
.h-right{display:flex;gap:6px;align-items:center}
.user-badge{background:var(--mavi);color:#fff;padding:7px 11px;border-radius:9px;font-size:13px;font-weight:700}
.user-badge.usta{background:var(--purple)}
.btn{background:var(--panel2);border:1px solid var(--border);padding:9px 14px;border-radius:9px;font-size:13px;cursor:pointer;font-weight:600;color:var(--text);min-height:40px}
.btn:active{transform:scale(0.96)}
.btn-primary{background:var(--mavi);color:#fff;border-color:var(--mavi)}
.refresh{padding:9px 12px;font-size:16px;min-width:42px}
.refresh.loading{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.kpi{background:var(--panel);padding:11px 8px;border-radius:12px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.kpi:active{transform:scale(0.97)}
.kpi.active{border-color:currentColor;background:var(--panel2)}
.kpi-num{font-size:24px;font-weight:800;line-height:1}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-top:5px;font-weight:600}
.kpi.k1{color:var(--red)} .kpi.k1 .kpi-num{color:var(--red)}
.kpi.k2{color:var(--orange)} .kpi.k2 .kpi-num{color:var(--orange)}
.kpi.k3{color:var(--purple)} .kpi.k3 .kpi-num{color:var(--purple)}
.kpi.k4{color:var(--green)} .kpi.k4 .kpi-num{color:var(--green)}

.toolbar{background:var(--panel);padding:10px;border-radius:12px;margin-bottom:10px;border:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:140px;padding:10px 13px;border:1px solid var(--border);border-radius:9px;font-size:14px;background:var(--bg);color:var(--text);min-height:42px}
.search::placeholder{color:var(--muted)}

.readonly-banner{background:rgba(251,191,36,0.12);border:1px solid #fbbf24;color:#fbbf24;padding:11px 13px;border-radius:11px;margin-bottom:10px;font-size:13px}
.readonly-banner.hide{display:none}

.setup-warning{background:rgba(251,146,60,0.12);border:1px solid var(--orange);color:var(--orange);padding:11px 13px;border-radius:11px;margin-bottom:10px;font-size:13px}

.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px;transition:transform 0.1s}
.card.done{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.3)}
.card.gecikti{border-color:rgba(248,113,113,0.5)}
.card-top{display:flex;gap:10px;margin-bottom:10px}
.card-img{width:88px;height:88px;border-radius:10px;background:var(--panel2);object-fit:contain;flex-shrink:0;border:1px solid var(--border);padding:4px}
.card-img-placeholder{width:88px;height:88px;border-radius:10px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;border:1px solid var(--border)}
.card-meta{flex:1;min-width:0}
.urun-adi{font-size:15px;font-weight:700;line-height:1.25;margin-bottom:3px;word-wrap:break-word}
.urun-cila{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:3px}
.urun-mus{font-size:12px;color:var(--muted);margin-bottom:6px}
.sip-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.sip-pill{background:var(--panel2);padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;border:1px solid var(--border)}
.termin-pill{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700}
.termin-gec{background:rgba(248,113,113,0.18);color:var(--red)}
.termin-kritik{background:rgba(251,146,60,0.18);color:var(--orange)}
.termin-uyari{background:rgba(251,191,36,0.18);color:var(--yellow)}
.termin-ok{background:rgba(74,222,128,0.18);color:var(--green)}
.termin-stk{background:rgba(74,158,255,0.18);color:var(--accent)}
.termin-tarihsiz{background:var(--panel2);color:var(--muted)}

.card-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px;padding:8px;background:var(--panel2);border-radius:8px;margin-bottom:10px}
.info-cell{display:flex;flex-direction:column;gap:2px;min-width:0}
.info-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
.info-val{font-size:12px;color:var(--text);font-weight:600;word-wrap:break-word;overflow-wrap:break-word}

.card-not{background:rgba(251,191,36,0.08);border-left:3px solid var(--yellow);padding:6px 10px;border-radius:6px;font-size:12px;color:var(--yellow);margin-bottom:10px;font-weight:500}
.card-not.hide{display:none}

.stages{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stage-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;border-radius:10px;border:2px solid var(--border);background:var(--panel2);cursor:pointer;transition:all 0.15s;user-select:none;position:relative;min-height:78px}
.stage-btn:active{transform:scale(0.95)}
.stage-btn.done{background:var(--green);border-color:var(--green);color:#0f1419}
.stage-btn.locked{opacity:0.5;cursor:not-allowed}
.stage-btn.locked::before{content:'🔒';position:absolute;top:3px;right:6px;font-size:10px}
.stage-icon{font-size:22px;line-height:1;margin-bottom:3px}
.stage-lbl{font-size:11px;font-weight:800;letter-spacing:0.4px}
.stage-time{font-size:10px;opacity:0.9;margin-top:3px;min-height:13px;font-weight:600}
.stage-by{font-size:9px;opacity:0.75;font-style:italic;min-height:11px}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:1000;max-width:90%;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.toast.err{background:var(--red);color:#fff}
.toast.ok{background:var(--green);color:var(--bg)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px}
.modal h3{margin-bottom:4px;font-size:18px}
.modal .desc{color:var(--muted);font-size:13px;margin-bottom:14px}
.modal input{width:100%;padding:14px;border:1px solid var(--border);border-radius:10px;font-size:22px;text-align:center;letter-spacing:10px;font-weight:700;margin-bottom:10px;background:var(--bg);color:var(--text);font-family:inherit}
.modal .err{color:var(--red);font-size:12px;margin-bottom:8px;min-height:16px;text-align:center;font-weight:600}
.modal .actions{display:flex;gap:8px;justify-content:flex-end}
.modal .actions .btn{padding:11px 18px}

@media (max-width:480px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .card-img,.card-img-placeholder{width:74px;height:74px}
  .urun-adi{font-size:14px}
  h1{font-size:15px}
  .stage-btn{min-height:84px;padding:14px 4px}
  .stage-icon{font-size:26px}
  .stage-lbl{font-size:12px}
  .card-info{grid-template-columns:1fr 1fr;gap:8px}
}

.note-box{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:10px;display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap}
.note-box.has-note{background:rgba(74,158,255,0.06);border-color:rgba(74,158,255,0.3)}
.note-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;padding-top:4px}
.note-input{flex:1;min-width:140px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);font-family:inherit;min-height:32px;resize:none;line-height:1.3}
.note-input:disabled{opacity:0.6;cursor:not-allowed}
.note-input:focus{outline:none;border-color:var(--accent);background:var(--panel)}
.note-actions{display:flex;gap:4px;align-items:center}
.note-btn{background:var(--accent);color:#fff;border:0;padding:7px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;min-width:36px;min-height:32px}
.note-btn:disabled{opacity:0.4;cursor:not-allowed}
.note-btn.del{background:var(--red)}
.note-display{flex:1;min-width:140px;font-size:13px;color:var(--accent);font-weight:500;line-height:1.4;padding:5px 0}
.note-display .note-meta{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;display:block}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="h-left">
    <h1>🧵 MOBIKS Döşeme</h1>
    <div class="subtitle">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Bağlanıyor...</span>
    </div>
  </div>
  <div class="h-right">
    <span class="user-badge" id="user-badge" style="display:none;"></span>
    <button class="btn btn-primary" id="login-btn" onclick="loginGoster()">🔑 Giriş</button>
    <button class="btn" id="logout-btn" onclick="cikis()" style="display:none;">Çıkış</button>
    <button class="btn refresh" id="refresh-btn" onclick="yukle()" title="Yenile">⟳</button>
  </div>
</header>

<div id="setup-section" class="setup-warning" style="display:none;">
  ⚙ <strong>İlk kurulum:</strong> Apps Script URL'i yapıştır.
  <div style="margin-top:10px;display:flex;gap:6px;">
    <input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/.../exec" style="flex:1;padding:9px;border:1px solid var(--orange);border-radius:7px;font-size:12px;background:var(--bg);color:var(--text);">
    <button onclick="kaydetURL()" class="btn" style="background:var(--orange);color:#fff;border-color:var(--orange);">Bağla</button>
  </div>
</div>

<div class="readonly-banner" id="readonly-banner">
  👁 <strong>Görüntüleme modu.</strong> İşaretleme için sağ üstte <strong>🔑 Giriş</strong> bas.
</div>

<div class="kpi-row">
  <div class="kpi k1" data-filter="bekliyor"><div class="kpi-num" id="kpi-bekliyor">0</div><div class="kpi-lbl">Bekliyor</div></div>
  <div class="kpi k2" data-filter="kesildi"><div class="kpi-num" id="kpi-kesim">0</div><div class="kpi-lbl">Kesildi</div></div>
  <div class="kpi k3" data-filter="dikildi"><div class="kpi-num" id="kpi-dikim">0</div><div class="kpi-lbl">Dikildi</div></div>
  <div class="kpi k4" data-filter="bitti"><div class="kpi-num" id="kpi-bitti">0</div><div class="kpi-lbl">Bitti</div></div>
</div>

<div class="toolbar">
  <input type="text" class="search" id="search-input" placeholder="🔍 Ürün, müşteri, sipariş ara...">
</div>

<div id="cards-container"></div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>🔑 PIN ile Giriş</h3>
    <div class="desc">4 haneli PIN'ini gir.</div>
    <input type="password" id="modal-pw" placeholder="••••" maxlength="6" inputmode="numeric" autocomplete="off">
    <div class="err" id="modal-err"></div>
    <div class="actions">
      <button class="btn" onclick="kapatModal()">Vazgeç</button>
      <button class="btn btn-primary" onclick="kontrolEt()">Giriş</button>
    </div>
  </div>
</div>

</div>

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

let API_URL = localStorage.getItem('mobiks_api_url') || '';
let PIN = localStorage.getItem('mobiks_pin') || '';
let KULLANICI_ADI = localStorage.getItem('mobiks_user_name') || '';
let DATA = [];
let aktivFiltre = 'all';
let aramaText = '';

const $ = (id) => document.getElementById(id);
const setStatus = (txt, ok = true) => {
  $('status-text').textContent = txt;
  $('status-dot').className = 'status-dot' + (ok ? '' : ' err');
};
const toast = (msg, kind = 'ok') => {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  setTimeout(() => t.classList.remove('show'), 2500);
};

function kaydetURL() {
  const url = $('api-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) {
    toast('URL script.google.com ile başlamalı', 'err'); return;
  }
  localStorage.setItem('mobiks_api_url', url);
  API_URL = url;
  $('setup-section').style.display = 'none';
  yukle();
}
if (!API_URL) {
  $('setup-section').style.display = 'block';
  setStatus('Kurulum bekleniyor', false);
}

function girisTaslagi() {
  if (PIN && KULLANICI_ADI) {
    $('login-btn').style.display = 'none';
    $('logout-btn').style.display = 'inline-block';
    const badge = $('user-badge');
    badge.textContent = '👤 ' + KULLANICI_ADI;
    badge.className = 'user-badge' + (KULLANICI_ADI.toLowerCase().includes('usta') ? ' usta' : '');
    badge.style.display = 'inline-block';
    $('readonly-banner').classList.add('hide');
  } else {
    $('login-btn').style.display = 'inline-block';
    $('logout-btn').style.display = 'none';
    $('user-badge').style.display = 'none';
    $('readonly-banner').classList.remove('hide');
  }
}
girisTaslagi();

function loginGoster() {
  $('modal-bg').classList.add('show');
  $('modal-pw').value = ''; $('modal-err').textContent = '';
  setTimeout(() => $('modal-pw').focus(), 50);
}
function kapatModal() { $('modal-bg').classList.remove('show'); }
async function kontrolEt() {
  const pw = $('modal-pw').value.trim();
  if (!pw) return;
  if (!API_URL) { toast('Önce URL bağla', 'err'); return; }
  try {
    const r = await fetch(API_URL + '?action=verify&pin=' + encodeURIComponent(pw));
    const j = await r.json();
    if (j.ok) {
      PIN = pw; KULLANICI_ADI = j.name;
      localStorage.setItem('mobiks_pin', pw);
      localStorage.setItem('mobiks_user_name', j.name);
      kapatModal(); girisTaslagi();
      toast('✓ Hoş geldin ' + j.name);
      render();
    } else {
      $('modal-err').textContent = j.error || 'Yanlış PIN';
      $('modal-pw').value = ''; $('modal-pw').focus();
    }
  } catch (e) { $('modal-err').textContent = 'Bağlantı hatası'; }
}
function cikis() {
  if (!confirm('Çıkış?')) return;
  PIN = ''; KULLANICI_ADI = '';
  localStorage.removeItem('mobiks_pin');
  localStorage.removeItem('mobiks_user_name');
  girisTaslagi(); render();
}
$('modal-pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') kontrolEt(); if (e.key === 'Escape') kapatModal(); });
$('modal-bg').addEventListener('click', (e) => { if (e.target.id === 'modal-bg') kapatModal(); });

async function yukle() {
  if (!API_URL) return;
  setStatus('Yükleniyor...');
  $('refresh-btn').classList.add('loading');
  try {
    const r = await fetch(API_URL + '?action=list');
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    DATA = j.rows || [];
    setStatus('Güncel ' + new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}));
    render();
  } catch (e) {
    setStatus('Bağlantı hatası', false);
    toast('Hata: ' + e.message, 'err');
  }
  $('refresh-btn').classList.remove('loading');
}

function asamaSayisi(d) {
  let n = 0;
  if (d.KESILDI_TARIH) n++;
  if (d.DIKILDI_TARIH) n++;
  if (d.DOSENDI_TARIH) n++;
  return n;
}
function durumKat(d) {
  if (d.DOSENDI_TARIH) return 'bitti';
  if (d.DIKILDI_TARIH) return 'dikildi';
  if (d.KESILDI_TARIH) return 'kesildi';
  return 'bekliyor';
}

// Termin hesabı: TARIH + 17 gün
function terminBilgi(d) {
  if (!d.TARIH) return {kat: 'tarihsiz', label: 'Tarihsiz', kalan: null};
  if ((d.MUSTERI || '').toString().toUpperCase() === 'STK') return {kat: 'stk', label: 'STK', kalan: null};
  const t = new Date(d.TARIH);
  if (isNaN(t)) return {kat: 'tarihsiz', label: 'Tarihsiz', kalan: null};
  const termin = new Date(t.getTime() + 17 * 86400000);
  termin.setHours(0,0,0,0);
  const kalan = Math.round((termin - TODAY) / 86400000);
  if (kalan < 0) return {kat: 'gec', label: (-kalan) + 'g GECİKTİ', kalan};
  if (kalan <= 3) return {kat: 'kritik', label: kalan + 'g kaldı', kalan};
  if (kalan <= 7) return {kat: 'uyari', label: kalan + 'g kaldı', kalan};
  return {kat: 'ok', label: kalan + 'g', kalan};
}

function urunResmi(urun) {
  const u = (urun || '').toString().toUpperCase().trim();
  if (URUN_IMG[u]) return URUN_IMG[u];
  // Önek eşleşmesi (örn "OTTO KARE PUF DIANA 590" → "OTTO KARE PUF")
  for (const key of Object.keys(URUN_IMG)) {
    if (u.startsWith(key)) return URUN_IMG[key];
  }
  return null;
}

function render() {
  const sayim = {bekliyor:0, kesildi:0, dikildi:0, bitti:0};
  DATA.forEach(d => sayim[durumKat(d)]++);
  $('kpi-bekliyor').textContent = sayim.bekliyor;
  $('kpi-kesim').textContent = sayim.kesildi;
  $('kpi-dikim').textContent = sayim.dikildi;
  $('kpi-bitti').textContent = sayim.bitti;

  document.querySelectorAll('.kpi').forEach(el => {
    el.classList.toggle('active', el.dataset.filter === aktivFiltre);
  });

  const container = $('cards-container');
  container.innerHTML = '';
  const arama = aramaText.toLowerCase().trim();

  const filtreli = DATA.filter(d => {
    if (aktivFiltre !== 'all' && durumKat(d) !== aktivFiltre) return false;
    if (arama) {
      const text = ((d.URUN||'') + ' ' + (d.MUSTERI||'') + ' ' + (d.SIP_NO||'') + ' ' + (d.KUMAS||'') + ' ' + (d.CILA||'')).toLowerCase();
      if (!text.includes(arama)) return false;
    }
    return true;
  });

  if (filtreli.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Bu filtrede satır yok</div>';
    return;
  }

  // Sıralama: GECİKEN ÖNCE → termine göre artan → bitenler en sona
  filtreli.sort((a, b) => {
    const ka = durumKat(a), kb = durumKat(b);
    // Bitenler en sona
    if (ka === 'bitti' && kb !== 'bitti') return 1;
    if (kb === 'bitti' && ka !== 'bitti') return -1;
    // Termin'e göre (geciken önce = kalan değeri negatif olan önce)
    const ta = terminBilgi(a).kalan;
    const tb = terminBilgi(b).kalan;
    const va = ta === null ? 9999 : ta;
    const vb = tb === null ? 9999 : tb;
    if (va !== vb) return va - vb;
    return (a.SIP_NO || '').toString().localeCompare((b.SIP_NO || '').toString());
  });

  filtreli.forEach(d => container.appendChild(kartYap(d)));
}

function parseStage(s) {
  if (!s) return null;
  const m = String(s).match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})(?:\s+(.+))?$/);
  if (m) {
    const [_, ymd, hm, isim] = m;
    const [y, mn, d] = ymd.split('-');
    return { tarih: d + '.' + mn + ' ' + hm, isim: isim || '' };
  }
  return { tarih: String(s), isim: '' };
}


// Sheets'teki "metin (Eren 08.06 14:32)" formatını ayırır
function parseUstaNot(s) {
  if (!s) return {metin: '', meta: ''};
  const m = String(s).match(/^(.*?)\s*\(([^()]+\s+\d{1,2}\.\d{2}\s+\d{2}:\d{2})\)\s*$/);
  if (m) return {metin: m[1].trim(), meta: m[2]};
  return {metin: String(s), meta: ''};
}

function notKutusu(d) {
  const div = document.createElement('div');
  const mevcut = parseUstaNot(d.USTA_NOT);
  div.className = 'note-box' + (mevcut.metin ? ' has-note' : '');
  
  div.innerHTML = '<div class="note-lbl">📝 NOT</div>';
  
  const input = document.createElement('textarea');
  input.className = 'note-input';
  input.placeholder = PIN ? 'Not yaz... (örn: Acele, Müşteri özel istek)' : '🔒 Giriş yapmadan not yazılamaz';
  input.value = mevcut.metin;
  input.rows = 1;
  if (!PIN) input.disabled = true;
  // Auto-grow
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = (input.scrollHeight) + 'px';
    kaydetBtn.disabled = false;
  });
  setTimeout(() => { input.style.height = 'auto'; input.style.height = (input.scrollHeight) + 'px'; }, 10);
  div.appendChild(input);
  
  const actions = document.createElement('div');
  actions.className = 'note-actions';
  
  const kaydetBtn = document.createElement('button');
  kaydetBtn.className = 'note-btn';
  kaydetBtn.textContent = '💾';
  kaydetBtn.title = 'Kaydet';
  kaydetBtn.disabled = true;
  if (!PIN) kaydetBtn.disabled = true;
  
  const silBtn = document.createElement('button');
  silBtn.className = 'note-btn del';
  silBtn.textContent = '✕';
  silBtn.title = 'Sil';
  if (!PIN || !mevcut.metin) silBtn.style.display = 'none';
  
  async function gonder(yeni_not) {
    if (!PIN) { toast('Önce giriş yap', 'err'); return; }
    kaydetBtn.disabled = true;
    silBtn.disabled = true;
    try {
      const url = API_URL + '?action=set_not&id=' + encodeURIComponent(d.ID) + '&not=' + encodeURIComponent(yeni_not) + '&pin=' + encodeURIComponent(PIN);
      const r = await fetch(url);
      const j = await r.json();
      if (j.error) throw new Error(j.error);
      
      // Yeni değeri local data'ya yansıt (timestamp+isim ile)
      if (yeni_not) {
        const now = new Date();
        const dt = String(now.getDate()).padStart(2,'0') + '.' + String(now.getMonth()+1).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        d.USTA_NOT = yeni_not + ' (' + KULLANICI_ADI + ' ' + dt + ')';
      } else {
        d.USTA_NOT = '';
      }
      toast(yeni_not ? '✓ Not kaydedildi' : 'Not silindi', 'ok');
      render();
    } catch (e) {
      toast('Hata: ' + e.message, 'err');
      kaydetBtn.disabled = false;
      silBtn.disabled = false;
    }
  }
  
  kaydetBtn.addEventListener('click', () => gonder(input.value.trim()));
  silBtn.addEventListener('click', () => {
    if (!confirm('Notu silmek istediğine emin misin?')) return;
    gonder('');
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      gonder(input.value.trim());
    }
  });
  
  actions.appendChild(kaydetBtn);
  actions.appendChild(silBtn);
  div.appendChild(actions);
  
  // Meta (kim ne zaman yazdı)
  if (mevcut.meta) {
    const meta = document.createElement('div');
    meta.style.cssText = 'width:100%;font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;';
    meta.textContent = '✍ ' + mevcut.meta;
    div.appendChild(meta);
  }
  
  return div;
}

function stageButonu(d, stageKey, ikon, lbl) {
  const colMap = {kesim:'KESILDI_TARIH', dikim:'DIKILDI_TARIH', doseme:'DOSENDI_TARIH'};
  const veri = parseStage(d[colMap[stageKey]]);
  const done = !!veri;
  const locked = !PIN;
  const btn = document.createElement('button');
  btn.className = 'stage-btn' + (done ? ' done' : '') + (locked ? ' locked' : '');
  btn.innerHTML = '<div class="stage-icon">' + ikon + '</div>' +
    '<div class="stage-lbl">' + lbl + '</div>' +
    '<div class="stage-time">' + (veri ? veri.tarih : '') + '</div>' +
    '<div class="stage-by">' + (veri && veri.isim ? veri.isim : '') + '</div>';
  btn.addEventListener('click', async () => {
    if (locked) { toast('Önce 🔑 Giriş yap', 'err'); return; }
    const wasActive = btn.classList.contains('done');
    const newVal = !wasActive;
    btn.classList.toggle('done');
    btn.querySelector('.stage-time').textContent = newVal ? 'kaydediliyor...' : '';
    btn.querySelector('.stage-by').textContent = '';
    try {
      const url = API_URL + '?action=update&id=' + encodeURIComponent(d.ID) + '&stage=' + stageKey + '&value=' + newVal + '&pin=' + encodeURIComponent(PIN);
      const r = await fetch(url);
      const j = await r.json();
      if (j.error) throw new Error(j.error);
      toast(newVal ? '✓ ' + lbl + ' işaretlendi' : lbl + ' geri alındı', 'ok');
      if (newVal) {
        const now = new Date();
        const ymd = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
        const hm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        d[colMap[stageKey]] = ymd + ' ' + hm + ' ' + KULLANICI_ADI;
      } else {
        d[colMap[stageKey]] = '';
      }
      render();
    } catch (e) {
      btn.classList.toggle('done');
      toast('Hata: ' + e.message, 'err');
      if (e.message.includes('Yetki')) cikis();
    }
  });
  return btn;
}

function kartYap(d) {
  const div = document.createElement('div');
  const kat = durumKat(d);
  const termin = terminBilgi(d);
  div.className = 'card' + (kat === 'bitti' ? ' done' : '') + (termin.kat === 'gec' ? ' gecikti' : '');

  // Üst: resim + meta
  const top = document.createElement('div');
  top.className = 'card-top';
  
  const resim = urunResmi(d.URUN);
  if (resim) {
    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = resim;
    img.alt = d.URUN;
    img.loading = 'lazy';
    top.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-img-placeholder';
    ph.textContent = '🪑';
    top.appendChild(ph);
  }
  
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  
  // Sipariş pill + termin pill
  const sipRow = document.createElement('div');
  sipRow.className = 'sip-row';
  sipRow.innerHTML = '<span class="sip-pill">Sip ' + (d.SIP_NO || '?') + '</span>' +
    '<span class="termin-pill termin-' + termin.kat + '">' + termin.label + '</span>';
  meta.appendChild(sipRow);
  
  // Ürün adı
  const ad = document.createElement('div');
  ad.className = 'urun-adi';
  ad.textContent = d.URUN || '';
  meta.appendChild(ad);
  
  // Cila (varsa)
  if (d.CILA && d.CILA !== '-') {
    const cila = document.createElement('div');
    cila.className = 'urun-cila';
    cila.textContent = '🎨 ' + d.CILA;
    meta.appendChild(cila);
  }
  
  // Müşteri
  const mus = document.createElement('div');
  mus.className = 'urun-mus';
  mus.textContent = '👤 ' + (d.MUSTERI || '-');
  meta.appendChild(mus);
  
  top.appendChild(meta);
  div.appendChild(top);
  
  // Info grid
  const info = document.createElement('div');
  info.className = 'card-info';
  const tarih = d.TARIH ? new Date(d.TARIH).toLocaleDateString('tr-TR', {day:'2-digit',month:'2-digit'}) : '-';
  info.innerHTML =
    '<div class="info-cell"><div class="info-lbl">Kumaş</div><div class="info-val">' + (d.KUMAS || '-') + '</div></div>' +
    '<div class="info-cell"><div class="info-lbl">Adet</div><div class="info-val">' + (d.ADET || 0) + ' koli</div></div>' +
    '<div class="info-cell"><div class="info-lbl">Sipariş</div><div class="info-val">' + tarih + '</div></div>';
  div.appendChild(info);
  
  // Not (AÇIKLAMA)
  if (d.NOT && d.NOT.trim() && d.NOT.toUpperCase() !== 'HAZIR ✓') {
    const not = document.createElement('div');
    not.className = 'card-not';
    not.textContent = '📌 ' + d.NOT;
    div.appendChild(not);
  }
  
  // Usta notu kutusu
  div.appendChild(notKutusu(d));
  
  // Stage butonları
  const stages = document.createElement('div');
  stages.className = 'stages';
  stages.appendChild(stageButonu(d, 'kesim', '✂', 'KESİLDİ'));
  stages.appendChild(stageButonu(d, 'dikim', '🧵', 'DİKİLDİ'));
  stages.appendChild(stageButonu(d, 'doseme', '🪑', 'DÖŞENDİ'));
  div.appendChild(stages);
  
  return div;
}

// KPI'lar tıklanabilir → filtre
document.querySelectorAll('.kpi').forEach(el => {
  el.addEventListener('click', () => {
    const yeniFiltre = el.dataset.filter;
    aktivFiltre = (aktivFiltre === yeniFiltre) ? 'all' : yeniFiltre;
    render();
  });
});

$('search-input').addEventListener('input', (e) => { aramaText = e.target.value; render(); });

setInterval(() => { if (API_URL) yukle(); }, 30000);
if (API_URL) yukle();
</script>
